name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────
  # Backend
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend – Tests & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Go einrichten
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Abhängigkeiten installieren
        working-directory: ./backend
        run: go mod download

      - name: Migrationen ausführen
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path ./migrations -database "$DATABASE_URL" up

      - name: Tests ausführen + Coverage messen
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable
        run: go test $(go list ./... | grep -v 'internal/db') -coverprofile=coverage.out -covermode=atomic -v

      - name: Coverage-Bericht anzeigen
        working-directory: ./backend
        run: go tool cover -func=coverage.out

      # - name: Coverage-Threshold prüfen (min. 50%)
      #   working-directory: ./backend
      #   run: |
      #     COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
      #     echo "Coverage: $COVERAGE%"
      #     if (( $(echo "$COVERAGE < 50" | bc -l) )); then
      #       echo "Coverage zu niedrig: $COVERAGE% (Minimum: 50%)"
      #       exit 1
      #     fi

  backend-build:
    name: Backend – Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Go einrichten
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Abhängigkeiten installieren
        working-directory: ./backend
        run: go mod download

      - name: Build prüfen
        working-directory: ./backend
        run: go build ./...

  # ─────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend – Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Abhängigkeiten installieren
        working-directory: ./frontend
        run: npm ci

      - name: ESLint ausführen
        working-directory: ./frontend
        run: npm run lint

  frontend-test:
    name: Frontend – Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Abhängigkeiten installieren
        working-directory: ./frontend
        run: npm ci

      - name: Tests ausführen + Coverage messen
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false --passWithNoTests

      # - name: Coverage-Threshold prüfen
      #   working-directory: ./frontend
      #   run: |
      #     # Threshold in jest.config.js konfigurieren:
      #     # coverageThreshold: { global: { lines: 50 } }

  frontend-build:
    name: Frontend – Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Abhängigkeiten installieren
        working-directory: ./frontend
        run: npm ci

      - name: Build prüfen
        working-directory: ./frontend
        env:
          API_URL: http://localhost:8080
        run: npm run build